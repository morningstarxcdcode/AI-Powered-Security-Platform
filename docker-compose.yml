version: "3.8"

services:
  # Scout CLI Development Environment
  scout-dev:
    build:
      context: .
      dockerfile: Dockerfile.advanced
      target: development
    container_name: scout-dev
    volumes:
      - .:/home/scout:cached
      - scout-venv:/home/scout/.venv
    ports:
      - "8000:8000" # Real-time dashboard
      - "8888:8888" # Jupyter notebook
      - "3000:3000" # Frontend development
    environment:
      - PYTHONPATH=/home/scout
      - SCOUT_ENV=development
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://scout:scout@postgres:5432/scout_db
    depends_on:
      - redis
      - postgres
    networks:
      - scout-network
    stdin_open: true
    tty: true
    command: bash

  # Redis for real-time monitoring and caching
  redis:
    image: redis:7-alpine
    container_name: scout-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - scout-network
    command: redis-server --appendonly yes

  # PostgreSQL for persistent data storage
  postgres:
    image: postgres:15-alpine
    container_name: scout-postgres
    environment:
      - POSTGRES_DB=scout_db
      - POSTGRES_USER=scout
      - POSTGRES_PASSWORD=scout
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - scout-network

  # Elasticsearch for log aggregation and search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: scout-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - scout-network

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: scout-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - scout-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: scout-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - scout-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: scout-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - scout-network

  # MinIO for S3-compatible object storage
  minio:
    image: quay.io/minio/minio:latest
    container_name: scout-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=scout
      - MINIO_ROOT_PASSWORD=scout123
    volumes:
      - minio-data:/data
    networks:
      - scout-network
    command: server /data --console-address ":9001"

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: scout-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - scout-network

  # NGINX for reverse proxy and load balancing
  nginx:
    image: nginx:alpine
    container_name: scout-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/ssl:/etc/nginx/ssl
    depends_on:
      - scout-dev
    networks:
      - scout-network

  # Security scanning with Trivy
  trivy:
    image: aquasec/trivy:latest
    container_name: scout-trivy
    volumes:
      - .:/workspace:ro
      - trivy-cache:/root/.cache
    networks:
      - scout-network
    command: fs --security-checks vuln,config /workspace

  # SonarQube for code quality analysis
  sonarqube:
    image: sonarqube:community
    container_name: scout-sonarqube
    ports:
      - "9001:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonar
      - SONAR_JDBC_USERNAME=scout
      - SONAR_JDBC_PASSWORD=scout
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      - postgres
    networks:
      - scout-network

  # Production-ready Scout CLI service
  scout-prod:
    build:
      context: .
      dockerfile: Dockerfile.advanced
      target: production
    container_name: scout-prod
    profiles:
      - production
    ports:
      - "8080:8000"
    environment:
      - SCOUT_ENV=production
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://scout:scout@postgres:5432/scout_db
    depends_on:
      - redis
      - postgres
    networks:
      - scout-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import scout; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  scout-venv:
  redis-data:
  postgres-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
  minio-data:
  trivy-cache:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:

networks:
  scout-network:
    driver: bridge
