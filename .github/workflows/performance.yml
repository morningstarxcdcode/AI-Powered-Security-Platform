name: Performance Monitoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC

env:
  PYTHON_VERSION: '3.11'

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest-benchmark memory-profiler psutil
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Create benchmark test
      run: |
        mkdir -p benchmarks
        cat > benchmarks/test_performance.py << 'EOF'
        import pytest
        import time
        from scout.cli import cli
        from click.testing import CliRunner

        @pytest.mark.benchmark
        def test_cli_help_performance(benchmark):
            """Benchmark CLI help command performance."""
            runner = CliRunner()

            def run_help():
                return runner.invoke(cli, ['--help'])

            result = benchmark(run_help)
            assert result.exit_code == 0

        @pytest.mark.benchmark
        def test_vuln_info_performance(benchmark):
            """Benchmark vulnerability info command performance."""
            runner = CliRunner()

            def run_vuln_info():
                return runner.invoke(cli, ['vuln-info', '--severity', 'high'])

            result = benchmark(run_vuln_info)
            # Command might fail but should complete quickly

        @pytest.mark.benchmark
        def test_compliance_info_performance(benchmark):
            """Benchmark compliance info command performance."""
            runner = CliRunner()

            def run_compliance():
                return runner.invoke(cli, ['compliance-info', '--framework', 'nist'])

            result = benchmark(run_compliance)
            # Command might fail but should complete quickly
        EOF

    - name: Run performance benchmarks
      run: |
        pytest benchmarks/ -v --benchmark-only --benchmark-json=benchmark-results.json || true

    - name: Memory usage analysis
      run: |
        echo "Measuring memory usage..."
        scout --help > /dev/null 2>&1 || true
        echo "Memory usage measurement completed" > memory-usage.json

    - name: Startup time analysis
      run: |
        echo "Measuring startup time..."
        for i in {1..5}; do
          start_time=$(date +%s%N)
          scout --help > /dev/null 2>&1 || true
          end_time=$(date +%s%N)
          duration=$(( (end_time - start_time) / 1000000 ))
          echo "Run $i: ${duration}ms"
        done > startup-times.txt

        echo "Startup time analysis completed"

    - name: Generate performance report
      run: |
        echo "# Performance Report" > performance-report.md
        echo "" >> performance-report.md
        echo "Generated on: $(date)" >> performance-report.md
        echo "Commit: ${{ github.sha }}" >> performance-report.md
        echo "" >> performance-report.md

        echo "## Benchmark Results" >> performance-report.md
        echo "" >> performance-report.md

        if [ -f benchmark-results.json ]; then
          echo "Benchmark tests completed successfully." >> performance-report.md
          echo "" >> performance-report.md
        else
          echo "No benchmark results available." >> performance-report.md
          echo "" >> performance-report.md
        fi

        echo "## Memory Usage" >> performance-report.md
        echo "" >> performance-report.md

        if [ -f memory-usage.json ]; then
          MEMORY=$(cat memory-usage.json | grep -o '"max_memory_mb": [0-9.]*' | cut -d: -f2 | tr -d ' ')
          echo "- Maximum memory usage: ${MEMORY} MB" >> performance-report.md
        fi

        echo "" >> performance-report.md
        echo "## Startup Time" >> performance-report.md
        echo "" >> performance-report.md

        if [ -f startup-times.txt ]; then
          echo "\`\`\`" >> performance-report.md
          cat startup-times.txt >> performance-report.md
          echo "\`\`\`" >> performance-report.md
        fi

        echo "" >> performance-report.md
        echo "## Recommendations" >> performance-report.md
        echo "" >> performance-report.md
        echo "- Monitor performance regressions" >> performance-report.md
        echo "- Optimize slow operations" >> performance-report.md
        echo "- Consider caching for repeated operations" >> performance-report.md

    - name: Upload performance artifacts
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: |
          performance-report.md
          benchmark-results.json
          memory-usage.json
          startup-times.txt

    - name: Performance regression check
      if: github.event_name == 'pull_request'
      run: |
        echo "Checking for performance regressions..."

        # This would typically compare with baseline performance
        # For now, just check that startup time is reasonable
        if [ -f startup-times.txt ]; then
          AVG=$(tail -1 startup-times.txt | grep -o '[0-9.]*ms' | cut -d'm' -f1)
          if (( $(echo "$AVG > 5000" | bc -l) )); then
            echo "⚠️ Warning: Startup time ($AVG ms) seems slow"
          else
            echo "✅ Startup time looks good ($AVG ms)"
          fi
        fi

  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install locust requests
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Create load test
      run: |
        mkdir -p load_tests
        cat > load_tests/locustfile.py << 'EOF'
        from locust import HttpUser, task, between
        import requests

        class ScoutLoadTest(HttpUser):
            wait_time = between(1, 3)

            @task
            def test_httpbin(self):
                # Test against httpbin.org (safe test target)
                self.client.get("/html")

            @task
            def test_status(self):
                self.client.get("/status/200")
        EOF

    - name: Run load test
      run: |
        echo "Running load test against httpbin.org..."
        # Start httpbin.org load test
        locust -f load_tests/locustfile.py --host=https://httpbin.org --users=10 --spawn-rate=2 --run-time=60s --headless --csv=load_test_results || true

    - name: Generate load test report
      run: |
        echo "# Load Test Report" > load-test-report.md
        echo "" >> load-test-report.md
        echo "Generated on: $(date)" >> load-test-report.md
        echo "" >> load-test-report.md

        if [ -f load_test_results_stats.csv ]; then
          echo "## Results Summary" >> load-test-report.md
          echo "" >> load-test-report.md
          echo "Load test completed successfully." >> load-test-report.md
          echo "" >> load-test-report.md
          echo "### Statistics" >> load-test-report.md
          echo "\`\`\`" >> load-test-report.md
          head -5 load_test_results_stats.csv >> load-test-report.md
          echo "\`\`\`" >> load-test-report.md
        else
          echo "Load test results not available." >> load-test-report.md
        fi

        echo "" >> load-test-report.md
        echo "## Configuration" >> load-test-report.md
        echo "- Users: 10" >> load-test-report.md
        echo "- Spawn Rate: 2/sec" >> load-test-report.md
        echo "- Duration: 60 seconds" >> load-test-report.md
        echo "- Target: https://httpbin.org" >> load-test-report.md

    - name: Upload load test results
      uses: actions/upload-artifact@v3
      with:
        name: load-test-results
        path: |
          load-test-report.md
          load_test_results*.csv
