name: Scout CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint-and-format:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: lint-${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          lint-${{ runner.os }}-pip-

    - name: Install lint dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy bandit safety isort
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Format check with black
      run: black --check --diff scout/ tests/ || true

    - name: Import sorting with isort
      run: isort --check-only --diff scout/ tests/ || true

    - name: Lint with flake8
      run: |
        flake8 scout/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 scout/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

    - name: Type checking with mypy
      run: mypy scout/ --ignore-missing-imports --no-strict-optional || true

    - name: Security check with bandit
      run: bandit -r scout/ -f json -o bandit-report.json || true

    - name: Upload bandit results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    needs: lint-and-format
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          - os: windows-latest
            python-version: '3.8'
          - os: macos-latest
            python-version: '3.8'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: test-${{ matrix.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          test-${{ matrix.os }}-${{ matrix.python-version }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Create test environment
      run: |
        mkdir -p test_results
        mkdir -p test_data

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short --cov=scout --cov-report=xml --cov-report=html --junitxml=test_results/junit.xml || true

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          test_results/
          htmlcov/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == env.PYTHON_VERSION
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Scout CLI
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Run dependency vulnerability scan
      run: |
        pip install safety
        safety check --json --output safety-report.json || true

    - name: Run Scout self-assessment
      run: |
        echo "Running Scout security assessment on test target..."
        scout webscan https://httpbin.org/html --output scout-test-results.json || true
        scout assess --target https://httpbin.org/html --format json --output scout-results.json || true

    - name: Upload security artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          scout-results.json
          scout-test-results.json

  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: always() && (needs.test.result == 'success')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel setuptools-scm

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/* || true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: python-package
        path: dist/

    - name: Test package installation
      run: |
        pip install dist/*.whl
        scout --help

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Docker image
      run: |
        docker build -t scout-cli:test .

    - name: Test Docker image
      run: |
        docker run --rm scout-cli:test --help
        docker run --rm scout-cli:test vuln-info --severity critical || true

    - name: Run security scan on Docker image
      run: |
        docker run --rm -v "$(pwd)":/workspace scout-cli:test assess --target https://httpbin.org/html --format json || true

    - name: Save Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker save scout-cli:test | gzip > scout-cli-image.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      if: github.ref == 'refs/heads/main'
      with:
        name: docker-image
        path: scout-cli-image.tar.gz

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .
        pip install pytest-benchmark memory-profiler

    - name: Run performance tests
      run: |
        pytest tests/ -v -k "not test" --durations=10 || true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-results
        path: |
          .pytest_cache/
          test_results/

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install sphinx sphinx-rtd-theme myst-parser

    - name: Generate API documentation
      run: |
        mkdir -p docs/api
        echo "# Scout CLI API Documentation" > docs/api/README.md
        echo "" >> docs/api/README.md
        echo "## Commands" >> docs/api/README.md
        echo "" >> docs/api/README.md
        echo "Scout CLI provides various security reconnaissance commands." >> docs/api/README.md
        echo "" >> docs/api/README.md
        echo "## Configuration" >> docs/api/README.md
        echo "" >> docs/api/README.md
        echo "Scout supports YAML/JSON configuration files." >> docs/api/README.md

    - name: Check documentation links
      run: |
        echo "Checking documentation for broken links..."
        find . -name "*.md" -type f -exec echo "Checking {}" \;

    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: docs/
